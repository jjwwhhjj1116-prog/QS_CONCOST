services:
  - type: web
    name: qs-concost
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/stats
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DB_PATH
        value: /var/data/tender_radar.db
      - key: AUTO_COLLECT_INTERVAL_MINUTES
        value: 0
      - key: AUTO_COLLECT_ON_START
        value: "false"
      # The free web instance can restart with an empty local SQLite volume.
      # Rebuilding a full week keeps the opportunity screen useful after a restart.
      - key: LOOKBACK_HOURS
        value: "72"
      - key: JIWONCOK_MAX_WORKERS
        value: "8"
      - key: JIWONCOK_TIMEOUT_SECONDS
        value: "16"
      - key: SCHEDULE_JOBS
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: ADMIN_USERNAME
        value: concost
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: DATA_GO_KR_SERVICE_KEY
        sync: false
      - key: LAW_API_OC
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DIGEST_FROM_EMAIL
        sync: false
      - key: DIGEST_RECIPIENTS
        sync: false
      - key: DIGEST_TRIGGER_TOKEN
        sync: false
    disk:
      name: qs-concost-data
      mountPath: /var/data
      sizeGB: 1
