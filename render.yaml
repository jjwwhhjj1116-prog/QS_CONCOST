services:
  - type: web
    name: qs-concost
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/stats
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DB_PATH
        value: /tmp/tender_radar.db
      - key: AUTO_COLLECT_INTERVAL_MINUTES
        value: 60
      - key: COOKIE_SECURE
        value: "true"
      - key: ADMIN_USERNAME
        value: concost
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: DATA_GO_KR_SERVICE_KEY
        sync: false
      - key: LAW_API_OC
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DIGEST_FROM_EMAIL
        sync: false
      - key: DIGEST_RECIPIENTS
        sync: false
      - key: DIGEST_TRIGGER_TOKEN
        sync: false
