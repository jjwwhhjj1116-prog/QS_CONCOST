name: CONCOST daily data collection

on:
  schedule:
    # 00:20 UTC = 09:20 KST every day
    - cron: "20 0 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake service for the internal 09:20 KST scheduler
        run: |
          curl --fail --retry 5 --retry-all-errors --max-time 240 \
            https://qs-concost.onrender.com/api/stats
