name: CONCOST manual data collection

on:
  # Render Cron is responsible for the exact 09:00 KST weekday schedule.
  # Keep this workflow only for manual collection tests.
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger manual collection test
        env:
          DIGEST_TRIGGER_TOKEN: ${{ secrets.DIGEST_TRIGGER_TOKEN }}
        run: |
          test -n "$DIGEST_TRIGGER_TOKEN"
          curl --fail --retry 5 --retry-all-errors --retry-delay 20 --max-time 540 \
            -X POST \
            -H "Authorization: Bearer $DIGEST_TRIGGER_TOKEN" \
            -H "X-Collect-Scheduled: false" \
            https://qs-concost.onrender.com/api/automation/collect
