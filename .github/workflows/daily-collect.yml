name: CONCOST daily data collection

on:
  schedule:
    # 00:00 UTC = 09:00 KST, Monday-Friday
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger 09:00 KST weekday collection
        env:
          DIGEST_TRIGGER_TOKEN: ${{ secrets.DIGEST_TRIGGER_TOKEN }}
        run: |
          test -n "$DIGEST_TRIGGER_TOKEN"
          curl --fail --retry 5 --retry-all-errors --retry-delay 20 --max-time 540 \
            -X POST \
            -H "Authorization: Bearer $DIGEST_TRIGGER_TOKEN" \
            https://qs-concost.onrender.com/api/automation/collect
