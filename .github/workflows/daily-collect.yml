name: CONCOST weekday data collection

on:
  schedule:
    # GitHub cron uses UTC. 00:00 UTC = 09:00 Asia/Seoul.
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

concurrency:
  group: concost-daily-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - name: Collect repeatedly from 09:00 to 09:55 KST
        env:
          DIGEST_TRIGGER_TOKEN: ${{ secrets.DIGEST_TRIGGER_TOKEN }}
          SCHEDULED_RUN: ${{ github.event_name == 'schedule' }}
        run: |
          test -n "$DIGEST_TRIGGER_TOKEN"
          rounds=1
          if [ "$SCHEDULED_RUN" = "true" ]; then rounds=6; fi

          for round in $(seq 1 "$rounds"); do
            echo "Collection sweep $round/$rounds"
            http_code=$(curl --silent --show-error --max-time 90 \
              --output /tmp/collect-response.json --write-out "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $DIGEST_TRIGGER_TOKEN" \
              -H "X-Collect-Scheduled: $SCHEDULED_RUN" \
              https://qs-concost.onrender.com/api/automation/collect)
            cat /tmp/collect-response.json
            if [ "$http_code" != "200" ] && [ "$http_code" != "202" ] && [ "$http_code" != "409" ]; then
              echo "Unexpected collection response: HTTP $http_code"
              exit 1
            fi
            if [ "$round" -lt "$rounds" ]; then sleep 600; fi
          done
