name: CONCOST daily data collection

on:
  schedule:
    # 00:20 UTC = 09:20 KST every day
    - cron: "20 0 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Wake service and refresh all data
        env:
          DIGEST_TRIGGER_TOKEN: ${{ secrets.DIGEST_TRIGGER_TOKEN }}
        run: |
          test -n "$DIGEST_TRIGGER_TOKEN"
          curl --fail-with-body --retry 3 --retry-all-errors --max-time 1740 \
            -X POST \
            -H "Authorization: Bearer $DIGEST_TRIGGER_TOKEN" \
            https://qs-concost.onrender.com/api/automation/collect
