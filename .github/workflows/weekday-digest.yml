name: CONCOST weekday email digest

on:
  schedule:
    # 23:30 UTC Sunday-Thursday = 08:30 KST Monday-Friday
    - cron: "30 23 * * 0-4"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wake service, collect data, and send digest
        env:
          DIGEST_TRIGGER_TOKEN: ${{ secrets.DIGEST_TRIGGER_TOKEN }}
        run: |
          test -n "$DIGEST_TRIGGER_TOKEN"
          curl --fail-with-body --retry 3 --retry-all-errors --max-time 840 \
            -X POST \
            -H "Authorization: Bearer $DIGEST_TRIGGER_TOKEN" \
            https://qs-concost.onrender.com/api/automation/digest
