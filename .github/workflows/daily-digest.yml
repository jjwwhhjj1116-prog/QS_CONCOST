name: CONCOST weekday email digest

on:
  schedule:
    # Start before the busy top-of-hour slot, then wait until exactly 10:00 KST.
    # GitHub cron uses UTC. 00:55 UTC = 09:55 Asia/Seoul.
    - cron: "55 0 * * 1-5"
  workflow_dispatch:

concurrency:
  group: concost-daily-email-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger scheduled email digest
        env:
          DIGEST_TRIGGER_TOKEN: ${{ secrets.DIGEST_TRIGGER_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
          SCHEDULED_RUN: ${{ github.event_name == 'schedule' }}
        run: |
          test -n "$DIGEST_TRIGGER_TOKEN"
          test -n "$RESEND_API_KEY"
          test -n "$DIGEST_FROM_EMAIL"
          test -n "$DIGEST_RECIPIENTS"
          if [ "$SCHEDULED_RUN" = "true" ]; then
            target_epoch=$(TZ=Asia/Seoul date -d "$(TZ=Asia/Seoul date +%F) 10:00:00" +%s)
            now_epoch=$(date +%s)
            wait_seconds=$((target_epoch - now_epoch))
            if [ "$wait_seconds" -gt 0 ] && [ "$wait_seconds" -le 600 ]; then
              echo "Waiting ${wait_seconds}s for 10:00 KST"
              sleep "$wait_seconds"
            fi
          fi
          echo "Current KST: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"
          curl --fail --retry 5 --retry-all-errors --retry-delay 20 --max-time 540 \
            -X POST \
            -H "Authorization: Bearer $DIGEST_TRIGGER_TOKEN" \
            -H "X-Resend-Api-Key: $RESEND_API_KEY" \
            -H "X-Digest-From-Email: $DIGEST_FROM_EMAIL" \
            -H "X-Digest-Recipients: $DIGEST_RECIPIENTS" \
            -H "X-Digest-Scheduled: $SCHEDULED_RUN" \
            https://qs-concost.onrender.com/api/automation/digest
