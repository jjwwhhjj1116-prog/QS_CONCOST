name: CONCOST daily email digest

on:
  schedule:
    # 01:00 UTC = 10:00 KST every day
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake service for the internal 10:00 KST mail scheduler
        run: |
          curl --fail --retry 5 --retry-all-errors --max-time 240 \
            https://qs-concost.onrender.com/api/stats
